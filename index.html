<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>descubra sua sexualidade 🌷</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#fdf6ef;
  --blush:#f7dcd7;
  --blush2:#f3c9c6;
  --coral:#e98973;
  --coral-deep:#d97060;
  --lav:#d9c9ef;
  --lav-deep:#b79fdd;
  --plum:#4a3b45;
  --plum-soft:#7a6572;
  --white:#fffaf5;
  --line:#ecdcd4;
  --display:'Fredoka',ui-rounded,sans-serif;
  --body:'Nunito',sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100vh;
  font-family:var(--body);
  color:var(--plum);
  background:
    radial-gradient(circle at 12% 18%, var(--blush) 0%, transparent 40%),
    radial-gradient(circle at 88% 12%, var(--lav) 0%, transparent 38%),
    radial-gradient(circle at 85% 90%, var(--blush2) 0%, transparent 42%),
    radial-gradient(circle at 10% 92%, var(--lav) 0%, transparent 38%),
    var(--cream);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 18px;
  position:relative;
  overflow-x:hidden;
}

/* floating hearts ambience */
.float{
  position:fixed;
  bottom:-40px;
  font-size:20px;
  opacity:.35;
  animation:floatUp linear infinite;
  pointer-events:none;
  z-index:0;
  filter:saturate(0.8);
}
@keyframes floatUp{
  to{ transform:translateY(-115vh) translateX(var(--drift,20px)) rotate(20deg); opacity:0; }
}

#card{
  width:100%;
  max-width:560px;
  background:var(--white);
  border:1px solid var(--line);
  border-radius:28px;
  padding:38px 34px 32px;
  box-shadow:0 30px 60px -25px rgba(150,100,110,.35), 0 2px 0 rgba(255,255,255,.6) inset;
  position:relative;
  z-index:1;
  animation:pop .5s cubic-bezier(.2,.8,.2,1);
}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

#card::before{
  content:"";
  position:absolute; inset:-1px;
  border-radius:29px;
  padding:1px;
  background:linear-gradient(135deg, var(--blush2), var(--lav));
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:.6;
  pointer-events:none;
}

.eyebrow{
  font-family:var(--body);
  font-weight:800;
  font-size:11.5px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--coral-deep);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:6px;
}
h1{
  font-family:var(--display);
  font-weight:600;
  font-size:26px;
  margin:0 0 10px;
  color:var(--plum);
  line-height:1.25;
}
.lede{
  font-size:14.5px;
  color:var(--plum-soft);
  line-height:1.65;
  margin-bottom:6px;
}
.note{
  font-size:12.5px;
  color:var(--plum-soft);
  background:linear-gradient(135deg,#faf1fb,#fdf3ee);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  margin-top:16px;
  line-height:1.6;
}

/* progress: soft heart-fill bar */
#progwrap{margin:22px 0 8px}
#proglabel{display:flex;justify-content:space-between;font-size:11.5px;color:var(--plum-soft);margin-bottom:6px;font-weight:700}
#progbar{
  height:12px;
  background:#f4ece6;
  border-radius:99px;
  overflow:hidden;
  border:1px solid var(--line);
  position:relative;
}
#progfill{
  height:100%;
  width:0;
  border-radius:99px;
  background:linear-gradient(90deg, var(--blush2), var(--coral), var(--lav-deep));
  transition:width .45s cubic-bezier(.3,.8,.3,1);
}

h2.q{
  font-family:var(--display);
  font-weight:500;
  font-size:18.5px;
  line-height:1.45;
  margin:20px 0 16px;
  color:var(--plum);
}
.opt{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:13px 15px;
  margin:9px 0;
  background:#fdf8f4;
  border:1.5px solid var(--line);
  border-radius:16px;
  cursor:pointer;
  transition:.18s ease;
  font-size:14px;
  line-height:1.5;
}
.opt:hover{border-color:var(--coral); background:#fff2ee; transform:translateY(-1px)}
.opt input{margin-top:2px; accent-color:var(--coral-deep)}
.opt.picked{border-color:var(--coral-deep); background:#fff0eb}

.btnrow{margin-top:22px; display:flex; gap:10px; flex-wrap:wrap}
button{
  font-family:var(--body);
  font-weight:800;
  font-size:14px;
  padding:12px 22px;
  border-radius:14px;
  border:1.5px solid var(--line);
  background:#fdf8f4;
  color:var(--plum);
  cursor:pointer;
  transition:.18s ease;
}
button:hover{transform:translateY(-1px); box-shadow:0 8px 18px -10px rgba(180,120,120,.5)}
button.primary{
  background:linear-gradient(135deg, var(--coral), var(--coral-deep));
  border-color:transparent;
  color:#fff9f6;
}
button.primary:hover{filter:brightness(1.04)}
button.ghost{background:transparent}
button:disabled{opacity:.45; cursor:not-allowed; transform:none; box-shadow:none}

/* result */
#resulticon{font-size:44px; line-height:1}
.result-name{
  font-family:var(--display);
  font-size:27px;
  font-weight:600;
  margin:6px 0 12px;
  background:linear-gradient(135deg, var(--coral-deep), var(--lav-deep));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.result-text{font-size:14.5px; line-height:1.75; color:var(--plum)}
.tag{
  display:inline-block;
  font-size:11px;
  font-weight:800;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--lav-deep);
  background:#f4eefb;
  border:1px solid #e6d9f7;
  padding:4px 10px;
  border-radius:99px;
  margin-bottom:14px;
}
</style>
</head>
<body>

<div id="card"></div>

<script>
const $ = s => document.querySelector(s);
const card = $("#card");

/* ambient floating hearts/flowers */
(function ambience(){
  const emojis = ["🌸","💛","🩷","✨","🌷","💜"];
  setInterval(()=>{
    const f=document.createElement("div");
    f.className="float";
    f.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    f.style.left = Math.random()*100+"vw";
    f.style.setProperty("--drift",(Math.random()*80-40)+"px");
    f.style.animationDuration = (9+Math.random()*8)+"s";
    f.style.fontSize = (14+Math.random()*14)+"px";
    document.body.appendChild(f);
    setTimeout(()=> f.remove(), 18000);
  }, 1400);
})();

/* ================= questions =================
   Two rotating axis-sets, 15 questions each = 30 total.
   SET A -> gender-of-attraction axis: HET, HOM, BI, PAN
   SET B -> nature/intensity axis: ACE, DEMI, QUEER, QUEST
*/
const SETA = ["HET","HOM","BI","PAN"];
const SETB = ["ACE","DEMI","QUEER","QUEST"];

const qsA = [
["quando vc pensa em uma pessoa que te atrai, o que vem primeiro?",
 ["alguém do gênero oposto ao meu","alguém do mesmo gênero que eu","pode ser dos dois, gosto dos dois","o gênero nem entra na conta — é a pessoa que importa"]],
["seu primeiro crush foi...",
 ["do gênero oposto ao meu, bem clássico","do mesmo gênero que eu","tive crush dos dois lados, sem preferência","nem lembro de pensar em gênero, só na pessoa"]],
["se pudesse escolher um crush de celebridade agora, seria...",
 ["alguém do gênero oposto","alguém do mesmo gênero","tenho uma lista dos dois, com certeza","várias pessoas diferentes — o gênero delas nunca foi o ponto"]],
["num filme romântico, o casal que te emociona mais é...",
 ["homem e mulher, o clássico","duas pessoas do mesmo gênero","qualquer combinação, desde que a história seja boa","eu nem reparo no gênero dos personagens, só na conexão"]],
["imaginando seu futuro, a pessoa ao seu lado é...",
 ["do gênero oposto ao meu","do mesmo gênero que eu","poderia ser dos dois, não fecho porta","sinceramente, não penso em gênero quando imagino isso"]],
["quando alguém do mesmo gênero que vc flerta, vc...",
 ["fico sem graça, não é bem meu lance","fico super interessado(a)","gosto, é uma possibilidade real pra mim","gosto — mas de novo, gênero nunca foi o que me chamou atenção"]],
["e quando é alguém do gênero oposto que flerta?",
 ["fico super interessado(a)","fico sem graça, não rola muito","gosto, é uma possibilidade real pra mim","gosto — mas o gênero não é o que pesa"]],
["seus personagens fictícios favoritos pra shippar costumam ser...",
 ["casais héteros clássicos","casais do mesmo gênero","um pouco de tudo, sem padrão fixo","eu shippo pela química, nunca pelo gênero"]],
["se te perguntassem 'menina ou menino', vc respiraria e diria...",
 ["tenho uma preferência clara por um lado","tenho uma preferência clara pelo outro lado","os dois, sinceramente","a pergunta em si meio que não faz sentido pra mim"]],
["na sua rede social, as pessoas que vc mais dá aquela stalkeada costumam ser...",
 ["do gênero oposto ao meu","do mesmo gênero que eu","uma mistura bem equilibrada","eu nem penso nisso quando entro no perfil de alguém"]],
["quando pensa em 'meu tipo', o que aparece?",
 ["um tipo bem definido, de gênero oposto","um tipo bem definido, do mesmo gênero","dois tipos bem diferentes, cada um de um gênero","um jeito de ser, mais do que uma aparência ou gênero"]],
["se seus amigos tivessem que te apresentar alguém, diriam...",
 ["'gosta do time oposto, pode chamar quem quiser desse lado'","'curte o mesmo time, chama alguém parecido'","'gosta dos dois, pode chamar geral'","'nem liga pra esse critério, só manda'"]],
["quando um casal do mesmo gênero se beija numa novela, vc...",
 ["acho bonito, mas não é algo que sinto na pele","sinto uma identificação bem forte","também sinto identificação, como sentiria com qualquer casal","sinto o mesmo de sempre — depende da cena, não do gênero"]],
["e quando é um casal hétero?",
 ["sinto uma identificação bem forte","acho bonito, mas não é algo que sinto na pele","sinto identificação também, igual sentiria com outro tipo de casal","de novo: depende da cena, não do gênero"]],
["se fosse resumir sua atração numa frase, seria...",
 ["'gosto do time oposto ao meu, sempre foi assim'","'gosto do meu próprio time, sempre foi assim'","'gosto dos dois times, sem hierarquia'","'eu gosto de pessoas — o time é o de menos'"]]
];

const qsB = [
["como costuma ser sua atração por alguém?",
 ["raramente sinto esse tipo de atração por alguém","só sinto depois de criar um vínculo forte","sinto, mas não quero encaixar isso num rótulo fixo","sinceramente, ainda tô tentando entender isso em mim"]],
["quando alguém 'bonito(a)' passa por vc na rua...",
 ["reconheço que é bonito(a), mas não sinto nada além disso","acho bonito(a), mas não sinto atração sem te conhecer","pode rolar uma faísca, mas prefiro não nomear o que é","às vezes sinto, às vezes não — e isso me deixa em dúvida"]],
["seus amigos falam de crush toda hora e vc...",
 ["meio que não entendo essa empolgação toda","só entendo quando é alguém que eu já conheço bem","entendo, mas minha forma de sentir é meio diferente da deles","entendo, mas ainda não sei nomear o que eu sinto"]],
["pra rolar interesse romântico por alguém, o mais importante pra vc é...",
 ["sinceramente, raramente sinto essa vontade","tempo e confiança construída primeiro","não sei bem — e tá tudo certo em não saber","ainda tô descobrindo o que me atrai de verdade"]],
["quando pensa em rótulos como 'hétero', 'gay', 'bi'...",
 ["nenhum deles parece te descrever, e tá tudo bem","sente que talvez um rótulo mais específico caiba com o tempo","prefere não escolher nenhum, e não sente falta disso","ainda tá tentando achar qual (se algum) combina com vc"]],
["conhecer alguém 'à primeira vista' e já sentir atração é...",
 ["algo que quase nunca acontece com vc","algo raro — geralmente precisa de tempo","acontece, mas o rótulo disso te importa pouco","às vezes sim, às vezes não, e vc ainda não entendeu o padrão"]],
["seus amigos comentam que vc é meio 'difícil de ler' quando o assunto é crush?",
 ["sim, porque sinceramente eu quase não tenho","sim, porque só desenvolvo depois de um tempo","sim, e eu gosto de ser um mistério, sem rótulo","sim, porque eu mesmo(a) ainda não me entendi direito"]],
["quando alguém te chama pra sair do nada...",
 ["fico sem saber por que estão interessados, não penso muito nisso","preciso conhecer melhor antes de saber se topo","topo numa boa, sem muito planejamento ou rótulo","topo, mas fico me perguntando o que realmente sinto depois"]],
["sobre pensar em namoro no futuro, vc...",
 ["não sente muita falta ou necessidade disso","só imagina isso com alguém que já é próximo","imagina, mas sem se prender a definições","imagina, mas ainda não sabe muito bem o que procura"]],
["quando um amigo pergunta 'você não curte ninguém?'...",
 ["respondo que realmente não é algo que sinto com frequência","respondo que só curto quando já conheço bem a pessoa","respondo que curto, só não gosto de rotular o que sinto","respondo que não sei, e que tá tudo bem não saber"]],
["seu jeito de amar costuma ser mais...",
 ["voltado pra amizade e conexão do que pra romance","lento, construído aos poucos","fluido, muda dependendo da fase da vida","ainda incerto — e vc tá se permitindo descobrir com calma"]],
["se sua forma de amar fosse uma estação do ano, seria...",
 ["inverno calmo, tranquilo, sem pressa de nada","primavera, que desabrocha aos poucos","uma estação que muda o tempo todo, imprevisível","uma estação ainda indefinida, tipo um dia de sol e chuva"]],
["quando pensa em intimidade física, vc...",
 ["não sente muita necessidade ou vontade disso","só sente vontade depois de um vínculo emocional forte","sente vontade, mas não liga de rotular isso","tem sentimentos meio confusos sobre isso, e tá explorando"]],
["sobre testes como esse, vc pensa...",
 ["'só de fazer já é mais do que eu costumo pensar nisso'","'preciso de mais tempo pra ter certeza de qualquer resposta'","'gosto de testes assim, mas não preciso do resultado pra me definir'","'talvez esse teste me ajude a entender um pouco melhor'"]],
["se pudesse escolher não ter que rotular nada, vc...",
 ["ficaria aliviado(a) — rótulo nunca fez muito sentido pra vc","tudo bem, mas ainda gosta de entender seus próprios padrões","escolheria isso na hora, rótulo fixo não é sua praia","gostaria, mas também sente curiosidade de descobrir um nome pra isso"]]
];

// build final 30-question list, alternating A/B
const questions = [];
for(let i=0;i<15;i++){
  questions.push({q:qsA[i][0], opts:qsA[i][1], cats:SETA});
  questions.push({q:qsB[i][0], opts:qsB[i][1], cats:SETB});
}

/* ================= results ================= */
const results = {
  HET: {
    icon:"🌻", name:"Heterossexualidade",
    text:"Parece que sua atração aponta pra pessoas de gênero diferente do seu, de um jeito bem consistente. É uma vivência tão válida quanto qualquer outra — sentir com clareza também é bonito."
  },
  HOM: {
    icon:"🌊", name:"Homossexualidade",
    text:"Suas respostas mostram uma atração forte e constante por pessoas do mesmo gênero que o seu. Se isso já era algo que vc sentia, talvez esse teste seja só um espelhinho confirmando o que seu coração já sabia."
  },
  BI: {
    icon:"🌈", name:"Bissexualidade",
    text:"Vc sente atração por mais de um gênero, sem uma regra fixa de qual pesa mais. Isso não é 'estar em cima do muro' — é sentir de verdade por caminhos diferentes, e os dois são igualmente reais."
  },
  PAN: {
    icon:"💫", name:"Pansexualidade",
    text:"Pelo que vc respondeu, gênero simplesmente não é o filtro pelo qual sua atração passa — é a pessoa, a energia, a conexão. Isso tem nome, e o nome é pansexualidade."
  },
  ACE: {
    icon:"🤍", name:"Assexualidade",
    text:"Sua atração desse tipo parece pouco frequente ou ausente, e isso não é um problema a resolver — é só um jeito diferente (e válido) de existir e amar. Existem tantas formas de conexão além dessa."
  },
  DEMI: {
    icon:"🌱", name:"Demissexualidade",
    text:"Pra vc, a atração parece nascer depois — de um vínculo, de confiança, de tempo junto. Não é frieza, é só um ritmo diferente: seu coração gosta de conhecer antes de sentir."
  },
  QUEER: {
    icon:"🦋", name:"Queer / Fluido(a)",
    text:"Suas respostas resistem a caber numa caixinha só, e tudo bem — talvez 'queer' ou 'fluido' sejam as palavras que mais abraçam quem vc é: alguém que sente sem precisar de um mapa fixo."
  },
  QUEST: {
    icon:"🌤️", name:"Ainda Descobrindo",
    text:"E olha, isso também é uma resposta válida. Não ter certeza agora não é atraso nem defeito — é só uma fase do caminho. Você tem todo o tempo do mundo pra ir se entendendo, sem pressa."
  }
};

/* ================= state & scoring ================= */
const state = { i:0, scores:{HET:0,HOM:0,BI:0,PAN:0,ACE:0,DEMI:0,QUEER:0,QUEST:0} };

/* ================= screens ================= */
function renderIntro(){
  card.innerHTML = `
    <div class="eyebrow">🌷 teste carinhoso</div>
    <h1>vamos descobrir, com calma,<br>um pouco mais sobre você?</h1>
    <p class="lede">30 perguntinhas sobre atração, crushes e sentimentos — sem certo ou errado, só um espaço seguro pra refletir sobre quem você é.</p>
    <div class="note">💛 esse teste é só um carinho, não um veredito. só você sabe de verdade quem você é — e não tem nenhuma pressa pra ter certeza de nada.</div>
    <div class="btnrow">
      <button class="primary" id="start">vamos começar</button>
    </div>
  `;
  $("#start").onclick = ()=>{ state.i=0; draw(); };
}

function draw(){
  const total = questions.length;
  const pct = Math.round(state.i/total*100);
  const cur = questions[state.i];

  card.innerHTML = `
    <div id="progwrap">
      <div id="proglabel"><span>pergunta ${state.i+1} de ${total}</span><span>${pct}%</span></div>
      <div id="progbar"><div id="progfill" style="width:${pct}%"></div></div>
    </div>
    <h2 class="q">${cur.q}</h2>
    <div id="opts"></div>
    <div class="btnrow">
      <button class="primary" id="nextbtn" disabled>próxima</button>
      ${state.i>0 ? '<button class="ghost" id="backbtn">voltar</button>' : ''}
    </div>
  `;

  const opts = $("#opts");
  cur.opts.forEach((text, n)=>{
    const label = document.createElement("label");
    label.className = "opt";
    label.innerHTML = `<input type="radio" name="a" value="${cur.cats[n]}"> <span>${text}</span>`;
    label.addEventListener("click", ()=>{
      document.querySelectorAll(".opt").forEach(o=> o.classList.remove("picked"));
      label.classList.add("picked");
      $("#nextbtn").disabled = false;
    });
    opts.appendChild(label);
  });

  if(state.i>0){
    $("#backbtn").onclick = ()=>{ state.i--; draw(); };
  }
  $("#nextbtn").onclick = ()=>{
    const c = document.querySelector("input[name=a]:checked");
    if(!c) return;
    state.scores[c.value]++;
    state.i++;
    if(state.i>=total){ showResult(); return; }
    draw();
  };
}

function showResult(){
  let top = "HET";
  for(const k in state.scores){ if(state.scores[k] > state.scores[top]) top = k; }
  const tied = Object.keys(state.scores).filter(k=> state.scores[k]===state.scores[top]);
  const chosen = tied[Math.floor(Math.random()*tied.length)];
  const r = results[chosen];

  card.innerHTML = `
    <div class="eyebrow">🌷 seu resultado</div>
    <div id="resulticon">${r.icon}</div>
    <div class="tag">com carinho, pra você</div>
    <div class="result-name">${r.name}</div>
    <p class="result-text">${r.text}</p>
    <div class="note">💛 lembrete gentil: nenhum teste te define de verdade. você é quem você sente que é, no seu tempo, do seu jeito — isso aqui é só um mimo pra pensar sobre si com carinho.</div>
    <div class="btnrow">
      <button class="primary" id="restart">refazer o teste</button>
    </div>
  `;
  $("#restart").onclick = ()=>{ state.i=0; for(const k in state.scores) state.scores[k]=0; renderIntro(); };
}

renderIntro();
</script>
</body>
</html>
