<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bridger WESTERN — O Quadro Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Bitter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ecd9ae;
  --paper2:#e3c795;
  --paper-dark:#d8bb84;
  --wood:#4a2f1c;
  --wood-deep:#33200f;
  --leather:#7a4a26;
  --rust:#a3402a;
  --rust-deep:#822f1e;
  --ink:#2b1d12;
  --ink-soft:#5a4632;
  --brass:#b8863b;
  --ok:#4c6b2f;
  --bad:#8a2c1f;
  --gold:#d8a63d;
  --display:'Rye', serif;
  --type:'Special Elite', cursive;
  --body:'Bitter', serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100vh;
  font-family:var(--body);
  color:var(--ink);
  background:
    radial-gradient(ellipse at 50% -10%, rgba(255,235,190,.5) 0%, transparent 55%),
    repeating-linear-gradient(0deg, rgba(90,60,20,.035) 0px, rgba(90,60,20,.035) 2px, transparent 2px, transparent 4px),
    linear-gradient(180deg, var(--wood) 0%, var(--wood-deep) 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 16px;
  overflow-x:hidden;
  cursor:none;
}
a{color:inherit}

/* ============ ambient canvas / sky fx (behind everything) ============ */
#dust{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}
#skyfx{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.critter{position:absolute;font-size:22px;filter:drop-shadow(0 3px 3px rgba(0,0,0,.4));pointer-events:auto;cursor:none;user-select:none}
.crow{font-size:18px;opacity:.85}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;box-shadow:inset 0 0 160px 40px rgba(20,10,0,.55)}

/* ============ custom cursor ============ */
#cursor-fx{
  position:fixed;top:0;left:0;width:34px;height:34px;z-index:9999;
  pointer-events:none;transform:translate(-50%,-50%);
  transition:transform .04s linear;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
}

/* ============ bullet holes overlay ============ */
#holes-layer{position:fixed;inset:0;z-index:3;pointer-events:none}
.hole{
  position:absolute;width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #1a1108 0%, #000 55%, transparent 75%);
  box-shadow:0 0 0 2px rgba(0,0,0,.15), 2px 2px 4px rgba(0,0,0,.4);
  transform:translate(-50%,-50%) rotate(var(--rot,0deg));
  animation:holepop .25s ease-out;
}
@keyframes holepop{from{transform:translate(-50%,-50%) scale(0)}to{transform:translate(-50%,-50%) scale(1) rotate(var(--rot,0deg))}}

/* ============ board (wanted-poster) ============ */
#board{
  width:100%;
  max-width:640px;
  background:
    radial-gradient(circle at 15% 10%, rgba(120,80,30,.25), transparent 45%),
    radial-gradient(circle at 90% 85%, rgba(120,80,30,.2), transparent 45%),
    var(--paper);
  border:10px solid var(--wood);
  outline:2px solid var(--brass);
  outline-offset:-16px;
  border-radius:4px;
  padding:30px 30px 24px;
  position:relative;
  z-index:5;
  box-shadow:0 30px 55px -20px rgba(0,0,0,.6), inset 0 0 60px rgba(90,55,20,.25);
  transition:transform .25s ease;
  will-change:transform;
}
#board::before{
  content:"";
  position:absolute; inset:0;
  background-image:radial-gradient(circle, rgba(80,50,20,.10) 1px, transparent 1.4px);
  background-size:4px 4px;
  pointer-events:none;
  mix-blend-mode:multiply;
  opacity:.5;
}
.pin{
  position:absolute; width:14px; height:14px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #e8c66a, var(--brass) 70%);
  box-shadow:0 2px 3px rgba(0,0,0,.5);
  z-index:6;
}
.pin.tl{top:-7px;left:18px} .pin.tr{top:-7px;right:18px}

#board.shake{animation:trainshake .5s ease-in-out}
@keyframes trainshake{
  0%,100%{transform:translate(0,0) rotate(0)}
  20%{transform:translate(-4px,2px) rotate(-.4deg)}
  40%{transform:translate(3px,-2px) rotate(.5deg)}
  60%{transform:translate(-3px,1px) rotate(-.3deg)}
  80%{transform:translate(2px,-1px) rotate(.3deg)}
}
#board.escaping{
  animation:escapeboard 2.6s cubic-bezier(.6,-0.2,.8,.3) forwards;
}
@keyframes escapeboard{
  0%{transform:translate(0,0) rotate(0) scale(1);opacity:1}
  30%{transform:translate(-16px,-30px) rotate(-4deg) scale(1.02)}
  60%{transform:translate(60px,-140px) rotate(12deg) scale(.96);opacity:.9}
  100%{transform:translate(220px,-820px) rotate(45deg) scale(.6);opacity:0}
}

.eyebrow{
  font-family:var(--type); font-size:12px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--rust-deep); text-align:center; margin-bottom:2px;
}
h1{
  font-family:var(--display); font-size:32px; text-align:center; margin:2px 0 4px;
  color:var(--ink); letter-spacing:.02em; text-shadow:1px 1px 0 rgba(255,255,255,.25);
}
.sub{font-family:var(--type); font-size:13px; text-align:center; color:var(--ink-soft); line-height:1.6; margin-bottom:6px}
hr.rope{
  border:none; height:6px; margin:14px 0; border-radius:3px; opacity:.8;
  background:repeating-linear-gradient(45deg, var(--leather) 0 3px, #8a5a30 3px 6px);
}
.note{
  font-family:var(--type); font-size:11.5px; color:var(--ink-soft);
  background:rgba(255,255,255,.25); border:1px dashed var(--leather); border-radius:6px;
  padding:10px 12px; margin-top:14px; line-height:1.6;
}

/* glitchy text */
.glitch{position:relative;display:inline-block}
.glitch.active::before,.glitch.active::after{
  content:attr(data-txt); position:absolute; left:0; top:0; width:100%; overflow:hidden;
}
.glitch.active::before{color:var(--rust); clip-path:inset(0 0 60% 0); transform:translate(-2px,-1px); animation:gl1 .25s infinite}
.glitch.active::after{color:#2b6; clip-path:inset(40% 0 0 0); transform:translate(2px,1px); animation:gl2 .3s infinite}
@keyframes gl1{0%,100%{transform:translate(-2px,-1px)}50%{transform:translate(2px,1px)}}
@keyframes gl2{0%,100%{transform:translate(2px,1px)}50%{transform:translate(-1px,-2px)}}

/* nav tabs */
#navbar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 4px}
.tabbtn{
  font-family:var(--type); font-size:11.5px; letter-spacing:.03em;
  padding:8px 11px; border:2px solid var(--leather); border-radius:5px;
  background:rgba(255,250,235,.5); color:var(--ink-soft); cursor:none;
}
.tabbtn.on{background:var(--rust); color:#f8ece0; border-color:var(--wood-deep)}

/* progress */
#progwrap{margin:14px 0 6px}
#proglabel{display:flex;justify-content:space-between;font-family:var(--type);font-size:11px;color:var(--ink-soft);margin-bottom:5px}
#progbar{height:14px;background:#c9ac78;border:2px solid var(--wood);border-radius:3px;overflow:hidden;position:relative}
#progfill{height:100%;width:0%;background:repeating-linear-gradient(90deg,var(--rust) 0 8px,var(--rust-deep) 8px 16px);transition:width .4s ease}

h2.q{font-family:var(--display);font-size:20px;line-height:1.4;margin:16px 0 14px;color:var(--ink);position:relative}
.opt{
  display:flex;align-items:center;gap:10px;padding:12px 14px;margin:9px 0;
  background:rgba(255,250,235,.55);border:2px solid var(--leather);border-radius:5px;
  cursor:none;font-family:var(--body);font-weight:600;font-size:14px;transition:.15s;color:var(--ink);
}
.opt:hover{background:rgba(255,250,235,.85);transform:translateX(2px)}
.opt.correct{border-color:var(--ok);background:#dfe9cf;color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#ecd6cf;color:var(--bad)}
.opt.disabled{pointer-events:none;opacity:.75}
.opt .letter{font-family:var(--display);font-size:16px;width:20px;text-align:center;color:var(--rust-deep)}
#feedback{font-family:var(--type);font-size:12.5px;min-height:18px;margin-top:4px;color:var(--ink-soft)}

.btnrow{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{
  font-family:var(--display);font-size:15px;letter-spacing:.03em;padding:10px 22px;border-radius:5px;
  border:2px solid var(--wood);background:var(--paper-dark);color:var(--ink);cursor:none;transition:.15s;
}
button:hover{transform:translateY(-1px);box-shadow:0 6px 14px -6px rgba(0,0,0,.5)}
button.primary{background:linear-gradient(180deg,var(--rust),var(--rust-deep));color:#f8ece0;border-color:var(--wood-deep)}
button:disabled{opacity:.4;cursor:none;transform:none;box-shadow:none}
button.ghost{background:transparent}

/* result */
#badge{
  width:88px;height:88px;margin:6px auto 8px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#f0d488,var(--brass) 75%);
  border:4px solid var(--wood);display:flex;align-items:center;justify-content:center;
  font-size:38px;box-shadow:0 8px 18px -8px rgba(0,0,0,.5);
}
.result-name{font-family:var(--display);font-size:25px;text-align:center;margin:6px 0 6px;color:var(--rust-deep)}
.score-line{font-family:var(--type);text-align:center;font-size:12.5px;color:var(--ink-soft);margin-bottom:10px}
.result-text{font-size:14px;line-height:1.75;color:var(--ink)}

/* duel */
.duelbox{
  text-align:center;padding:36px 10px;border:2px dashed var(--leather);border-radius:8px;
  background:rgba(255,255,255,.25);margin-top:6px;position:relative;overflow:hidden;
}
.duelword{font-family:var(--display);font-size:30px;color:var(--rust-deep);min-height:44px}
.duelhint{font-family:var(--type);font-size:12px;color:var(--ink-soft);margin-top:6px}
.stat-row{display:flex;justify-content:space-around;margin-top:12px;font-family:var(--type);font-size:11.5px;color:var(--ink-soft)}
.stat-row b{display:block;font-family:var(--display);font-size:17px;color:var(--ink)}

/* witch */
.card{
  margin:16px auto 6px;width:170px;height:230px;border-radius:10px;border:3px solid var(--wood);
  background:linear-gradient(160deg,var(--paper2),var(--paper));display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:14px;position:relative;
  box-shadow:0 12px 22px -10px rgba(0,0,0,.5);
  transform-style:preserve-3d;transition:transform .5s;
}
.card.flip{transform:rotateY(360deg)}
.card .cicon{font-size:40px;margin-bottom:8px}
.card .cname{font-family:var(--display);font-size:16px;color:var(--rust-deep)}
.card.rare{border-color:var(--gold);box-shadow:0 0 24px -2px rgba(216,166,61,.7)}
.cardtext{font-size:12.5px;text-align:center;color:var(--ink-soft);margin-top:10px;line-height:1.6;min-height:40px}

/* bounty grid */
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.bcard{
  border:2px solid var(--leather);border-radius:7px;padding:10px;background:rgba(255,255,255,.35);
  font-size:11.5px;line-height:1.5;color:var(--ink-soft);min-height:88px;position:relative;
}
.bcard.locked{opacity:.55;filter:grayscale(.4)}
.bcard .bicon{font-size:20px}
.bcard .bname{font-family:var(--type);font-size:11.5px;color:var(--ink);display:block;margin:3px 0 2px}
.bcount{font-family:var(--type);text-align:center;font-size:12px;color:var(--ink-soft);margin-top:4px}

.secretlist{list-style:none;padding:0;margin:10px 0 0;font-size:13px;line-height:2;color:var(--ink-soft)}
.secretlist li::before{content:"✺ ";color:var(--rust)}

/* sheriff widget */
#sheriff{
  position:fixed;right:18px;bottom:18px;z-index:50;display:flex;flex-direction:column;
  align-items:flex-end;gap:8px;
}
#sheriff-icon{
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#3a2a1a,#1a0f08 75%);
  border:3px solid var(--brass);display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:none;box-shadow:0 8px 18px -8px rgba(0,0,0,.7);
  animation:float 3.4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#sheriff-bubble{
  max-width:230px;background:var(--paper);border:2px solid var(--wood);border-radius:8px 8px 2px 8px;
  padding:9px 11px;font-family:var(--type);font-size:11.5px;color:var(--ink);line-height:1.5;
  box-shadow:0 8px 16px -6px rgba(0,0,0,.5);opacity:0;transform:translateY(6px);
  transition:opacity .25s,transform .25s;
}
#sheriff-bubble.show{opacity:1;transform:translateY(0)}

/* toasts */
#toast-area{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{
  background:linear-gradient(180deg,var(--paper2),var(--paper));border:2px solid var(--brass);
  border-radius:6px;padding:9px 16px;font-family:var(--type);font-size:12px;color:var(--ink);
  box-shadow:0 10px 20px -8px rgba(0,0,0,.6);animation:toastin .35s ease, toastout .4s ease 3.4s forwards;
  display:flex;gap:8px;align-items:center;
}
@keyframes toastin{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastout{to{opacity:0;transform:translateY(-10px)}}

/* fake os notification */
#notif-area{position:fixed;bottom:18px;left:18px;z-index:70}
.osnotif{
  width:250px;background:#f4f1ea;border-radius:8px;border:1px solid #c9c2ad;color:#2b1d12;
  padding:10px 12px;font-family:var(--body);font-size:12px;box-shadow:0 14px 28px -10px rgba(0,0,0,.5);
  animation:slidein .4s ease;
}
.osnotif b{display:block;font-size:12.5px;margin-bottom:2px}
@keyframes slidein{from{transform:translateX(-120%)}to{transform:translateX(0)}}
.osnotif .x{float:right;cursor:none;opacity:.5;font-size:11px}

/* konami / final overlays */
#finalOverlay{
  position:fixed;inset:0;z-index:200;background:#0a0603;display:none;align-items:center;justify-content:center;
  flex-direction:column;color:#f2e2b8;text-align:center;padding:30px;
}
#finalOverlay h2{font-family:var(--display);font-size:30px;color:var(--gold);margin-bottom:10px}
#finalOverlay p{font-family:var(--type);font-size:13px;line-height:1.8;max-width:420px}

.hidden-critter{position:absolute;font-size:15px;cursor:none;opacity:.85}

@media (max-width:480px){
  h1{font-size:26px}
  .bgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<canvas id="dust"></canvas>
<div id="skyfx"></div>
<div class="vignette"></div>
<div id="holes-layer"></div>
<div id="cursor-fx">🤠</div>
<div id="toast-area"></div>
<div id="notif-area"></div>

<div id="sheriff">
  <div id="sheriff-bubble"></div>
  <div id="sheriff-icon" title="O Xerife Fantasma">💀</div>
</div>

<div id="board">
  <div class="pin tl"></div><div class="pin tr"></div>
  <div id="content"></div>
</div>

<div id="finalOverlay">
  <h2>O FORASTEIRO ESCAPOU</h2>
  <p>O quadro estava vivo o tempo todo. Vc reuniu cada pedaço dele — cada carta, cada tiro, cada segredo — e agora não sobrou nada pregado na parede além de um buraco e poeira ainda no ar.<br><br>Ridge B Valley vai lembrar do seu nome. Ou vai fingir que nunca existiu.</p>
  <div class="btnrow"><button class="primary" onclick="location.reload()">recomeçar do zero</button></div>
</div>

<script>
/* ============================================================
   STATE
============================================================ */
const state = {
  tab:'home',
  quiz:{i:0,score:0,locked:false,streak:0,maxStreak:0,finished:false},
  duel:{phase:'idle',timeoutId:null,drawAt:0,best:Infinity,fails:0,plays:0},
  witch:{draws:0},
  clicks:0, holes:0, sheriffClicks:0, spiderClicks:0,
  idleSeconds:0, lastActivity:Date.now(),
  typedBuffer:'', konamiIndex:0,
  achievements:new Set(),
  soundOn:true, audioCtx:null,
  tumbleweedHits:0,
};
const KONAMI=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];

const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const content=$('#content');
const now=()=>Date.now();

function markActivity(){ state.lastActivity=now(); state.idleSeconds=0; }

/* ============================================================
   ACHIEVEMENTS
============================================================ */
const ACHV = [
 {id:'first_answer', icon:'🎯', name:'Primeiro Tiro', desc:'Responda sua primeira pergunta do quiz.'},
 {id:'streak5', icon:'🥶', name:'Sangue Frio', desc:'Acerte 5 perguntas seguidas no quiz.'},
 {id:'perfect', icon:'👑', name:'Gabarito de Lenda', desc:'Acerte as 25 perguntas do quiz.'},
 {id:'fastdraw', icon:'⚡', name:'Mão Mais Rápida do Oeste', desc:'Reaja em menos de 300ms no duelo rápido.'},
 {id:'nervous', icon:'😬', name:'Atirador Nervoso', desc:'Atire cedo demais 3 vezes no duelo.'},
 {id:'witchfriend', icon:'🔮', name:'Fez as Pazes com a Bruxa', desc:'Puxe uma carta da sorte 5 vezes.'},
 {id:'eldorado', icon:'🌟', name:'Sorte Grande', desc:'Tire a carta rara El Dorado na cabana da bruxa.'},
 {id:'spider', icon:'🕷️', name:'Caçador de Aranhas', desc:'Clique no bicho escondido 3 vezes.'},
 {id:'konami', icon:'🗺️', name:'Decifrador', desc:'Encontre o código antigo das setas.'},
 {id:'magicword', icon:'📜', name:'Sussurro Mágico', desc:'Digite a palavra mágica em qualquer lugar da tela.'},
 {id:'pokesheriff', icon:'👻', name:'Perturbador do Xerife', desc:'Cutuque o xerife fantasma 10 vezes.'},
 {id:'patient', icon:'🌵', name:'Andarilho Paciente', desc:'Fique parado, sem tocar em nada, por 45 segundos.'},
 {id:'holes', icon:'🔫', name:'Colecionador de Buracos', desc:'Deixe 15 buracos de bala na tela.'},
 {id:'tumbleweed', icon:'🌾', name:'Observador do Vento Rodante', desc:'Clique num vento-rolante enquanto ele atravessa a tela.'},
];
const META_ID='legend_alive';

function unlock(id){
  if(state.achievements.has(id)) return;
  state.achievements.add(id);
  const a=ACHV.find(x=>x.id===id);
  if(a){ toast(`🏅 Conquista: ${a.name}`); speak('achievement'); playSound('achv'); }
  renderBountyIfOpen();
  checkMeta();
}
function checkMeta(){
  if(state.achievements.has(META_ID)) return;
  const allDone = ACHV.every(a=>state.achievements.has(a.id));
  if(allDone){
    state.achievements.add(META_ID);
    setTimeout(triggerEscape, 900);
  }
}
function renderBountyIfOpen(){ if(state.tab==='bounty') renderBounty(); }

/* ============================================================
   TOASTS
============================================================ */
function toast(msg){
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<span>${msg}</span>`;
  $('#toast-area').appendChild(el);
  setTimeout(()=>el.remove(), 3900);
}

/* ============================================================
   GHOST SHERIFF — "quase uma IA": escolhe frases de acordo com o contexto,
   preenche variáveis, e reage aos seus próprios stats.
============================================================ */
const SHERIFF = {
  start:["Ah, mais um forasteiro chegando na cidade...","Cuidado por onde pisa, isso aqui não é pra qualquer um.","Já vi muita gente como vc passar por essa cidade. A maioria não voltou."],
  correct:["Bom faro.","Vc não é tão burro quanto parece.","Isso mesmo, parceiro.","Interessante... continue."],
  wrong:["Errado. Aposto que nem sabe segurar um revólver direito.","Isso doeu em mim também.","Hm. Vou anotar isso no seu arquivo."],
  streak:["{n} seguidas! Alguém aqui nasceu pra isso.","Sequência de {n}. Cuidado, a fama sobe rápido por aqui."],
  idle:["Zzz... acorda, forasteiro.","O sol tá quase se pondo e vc só olhando pra tela.","Isso é uma estátua ou um jogador?","Continue parado. Eu tenho todo o tempo do mundo."],
  achievement:["Mais uma pra sua coleção.","O quadro de procurados cresce.","Anotado no seu histórico, forasteiro."],
  secret:["Ah... vc achou. Isso não devia estar aí.","Curioso, hein? Gosto disso.","Poucos reparam nisso. Vc reparou."],
  poked:["Para de me cutucar.","Isso não vai me trazer de volta à vida, sabia?","Mais uma vez e eu conto pro xerife de verdade.","..."],
  ambient:["Esse vento não para de soprar poeira.","Andam dizendo que tem ouro nas colinas.","Fica de olho, as coisas por aqui tem vida própria.","Esse trem das 3 nunca chega no horário.","Alguém pregou esse quadro na parede há muito tempo. Ninguém lembra quem."],
};
let sheriffTimer=null;
function speak(category, vars={}){
  const arr=SHERIFF[category]; if(!arr) return;
  let line=arr[Math.floor(Math.random()*arr.length)];
  Object.keys(vars).forEach(k=> line=line.replaceAll(`{${k}}`, vars[k]));
  const bubble=$('#sheriff-bubble');
  bubble.textContent='';
  bubble.classList.add('show');
  clearTimeout(sheriffTimer);
  let i=0;
  const type=()=>{ bubble.textContent=line.slice(0,i++); if(i<=line.length) setTimeout(type,18); };
  type();
  sheriffTimer=setTimeout(()=>bubble.classList.remove('show'), 4200);
}
$('#sheriff-icon').addEventListener('click', ()=>{
  markActivity();

/* ============================================================
   SOUND (WebAudio, no files needed)
============================================================ */
function ctx(){
  if(!state.audioCtx){ try{ state.audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return state.audioCtx;
}
function beep(freq,dur,type='square',gain=.05,delay=0){
  if(!state.soundOn) return;
  const c=ctx(); if(!c) return;
  const t=c.currentTime+delay;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t+dur);
}
function playSound(kind){
  if(kind==='click') beep(180,.05,'square',.04);
  if(kind==='correct'){ beep(520,.09,'triangle',.06); beep(780,.12,'triangle',.05,.09); }
  if(kind==='wrong') beep(120,.25,'sawtooth',.06);
  if(kind==='shot') beep(90,.12,'square',.08);
  if(kind==='achv'){ beep(440,.08,'square',.05); beep(660,.08,'square',.05,.08); beep(880,.16,'square',.05,.16); }
  if(kind==='card') beep(300,.1,'sine',.04);
}

/* ============================================================
   BACKGROUND DUST PARTICLES
============================================================ */
const canvas=$('#dust'), gctx=canvas.getContext('2d');
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resize(); addEventListener('resize', resize);
const particles=Array.from({length:70},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.6+.4, s:Math.random()*.3+.05, drift:Math.random()*.4-.2
}));
function loopDust(){
  gctx.clearRect(0,0,canvas.width,canvas.height);
  gctx.fillStyle='rgba(230,200,150,0.5)';
  particles.forEach(p=>{
    p.y-=p.s; p.x+=p.drift;
    if(p.y<-5) p.y=innerHeight+5;
    if(p.x<-5) p.x=innerWidth+5; if(p.x>innerWidth+5) p.x=-5;
    gctx.beginPath(); gctx.arc(p.x,p.y,p.r,0,7); gctx.fill();
  });
  requestAnimationFrame(loopDust);
}
loopDust();

function renderQuiz(){
  if(state.quiz.finished){ renderQuizResult(); return; }
  const {i,score,streak}=state.quiz;
  const total=qs.length;
  const pct=Math.round(i/total*100);
  const [qtext,opts,correctIdx]=qs[i];
  const showSpider = Math.random()<0.22;
  content.innerHTML = navHTML('quiz') + `
    <div id="progwrap">
      <div id="proglabel"><span>pergunta ${i+1} de ${total}</span><span>acertos: ${score} · sequência: ${streak}</span></div>
      <div id="progbar"><div id="progfill" style="width:${pct}%"></div></div>
    </div>
    <h2 class="q">${qtext}${showSpider?'<span class="hidden-critter" id="spiderbug" style="top:-6px;right:0" title="?">🕷️</span>':''}</h2>
    <div id="opts"></div>
    <div id="feedback"></div>
    <div class="btnrow"><button class="primary" id="nextbtn" disabled>próxima</button></div>
  `;
  bindNav();
  if(showSpider){
    $('#spiderbug').onclick=(e)=>{
      e.stopPropagation(); markActivity(); state.spiderClicks++;
      e.target.remove();
      if(state.spiderClicks>=3) unlock('spider');
      else toast('🕷️ algo se mexeu ali...');
    };
  }
  const optsEl=$('#opts'); const letters=['A','B','C','D'];
  opts.forEach((text,n)=>{
    const el=document.createElement('div'); el.className='opt';
    el.innerHTML=`<span class="letter">${letters[n]}</span><span>${text}</span>`;
    el.addEventListener('click', ()=>pickQuiz(n,correctIdx,el));
    optsEl.appendChild(el);
  });
  $('#nextbtn').onclick=()=>{
    state.quiz.i++;
    if(state.quiz.i>=total){ state.quiz.finished=true; renderQuizResult(); return; }
    renderQuiz();
  };
}
function pickQuiz(n,correctIdx,el){
  if(state.quiz.locked) return;
  markActivity(); state.quiz.locked=true;
  const opts=$$('.opt'); opts.forEach(o=>o.classList.add('disabled'));
  if(state.quiz.i===0) unlock('first_answer');
  if(n===correctIdx){
    el.classList.add('correct'); state.quiz.score++; state.quiz.streak++;
    state.quiz.maxStreak=Math.max(state.quiz.maxStreak,state.quiz.streak);
    $('#feedback').textContent='acertou! bom faro, cowboy.';
    playSound('correct'); speak('correct');
    if(state.quiz.streak===5) { unlock('streak5'); speak('streak',{n:state.quiz.streak}); }
  }else{
    el.classList.add('wrong'); opts[correctIdx].classList.add('correct');
    state.quiz.streak=0;
    $('#feedback').textContent='errou essa — mas segue o rastro.';
    playSound('wrong'); speak('wrong');
  }
  $('#proglabel').innerHTML=`<span>pergunta ${state.quiz.i+1} de ${qs.length}</span><span>acertos: ${state.quiz.score} · sequência: ${state.quiz.streak}</span>`;
  $('#nextbtn').disabled=false;
}
function rankFor(score){
  if(score<=4) return {icon:'🥾',name:'Caipira Perdido',text:'Vc mal sabe distinguir um cavalo de uma mula, mas todo forasteiro começa em algum lugar.'};
  if(score<=9) return {icon:'🐎',name:'Aprendiz de Cowboy',text:'Já sabe onde fica o Lake Boullier — mas Ridge B Valley ainda guarda segredos.'};
  if(score<=14) return {icon:'🔫',name:'Pistoleiro Errante',text:'Vc conhece o jogo de verdade. Falta afiar a mira nos detalhes mais obscuros.'};
  if(score<=19) return {icon:'⭐',name:'Forasteiro Respeitado',text:'Poucos sabem tanto quanto vc. Seu nome já circula pelos becos da fronteira.'};
  if(score<=23) return {icon:'💀',name:'Lenda de Ridge B Valley',text:'Vc domina quase tudo. Poucos duelam com vc e vivem pra contar.'};
  return {icon:'👑',name:'Lenda Absoluta da Fronteira',text:'Gabarito perfeito. Vc não jogou Bridger: WESTERN — vc viveu nele.'};
}
function renderQuizResult(){
  const r=rankFor(state.quiz.score);

  content.innerHTML = navHTML('quiz') + `

function renderDuel(){

    <h2 class="q">Duelo Rápido</h2>

    </div>
    <div class="stat-row">
      <div><b id="dbest">${state.duel.best===Infinity?'—':state.duel.best+'ms'}</b>melhor tempo</div>
      <div><b id="dplays">${state.duel.plays}</b>duelos</div>
      <div><b id="dfails">${state.duel.fails}</b>trapaças</div>
    </div>
    <div class="btnrow"><button class="primary" id="duelbtn">preparar</button></div>
  `;
  bindNav();
  $('#duelbtn').onclick=()=>duelClick();
}
function duelClick(){
  markActivity();
  const word=$('#duelword'), hint=$('#duelhint'), btn=$('#duelbtn');
  if(state.duel.phase==='idle'){
    state.duel.phase='waiting'; word.textContent='espera...'; hint.textContent='não clique ainda';
    btn.textContent='(espere)';
    const delay=1000+Math.random()*3000;
    state.duel.timeoutId=setTimeout(()=>{
      state.duel.phase='draw'; state.duel.drawAt=now();
      word.textContent='ATIRA! 🔫'; word.style.color='var(--rust)';
      hint.textContent='clica agora!'; btn.textContent='ATIRA!';
      playSound('shot');
    }, delay);
  } else if(state.duel.phase==='waiting'){
    clearTimeout(state.duel.timeoutId);
    state.duel.phase='idle'; state.duel.fails++;
    word.textContent='cedo demais!'; word.style.color='var(--bad)';
    hint.textContent='vc foi baleado por trapacear. tente de novo.'; btn.textContent='preparar';
    playSound('wrong'); speak('wrong');
    $('#dfails').textContent=state.duel.fails;
    if(state.duel.fails>=3) unlock('nervous');
  } else if(state.duel.phase==='draw'){
    const t=now()-state.duel.drawAt;
    state.duel.phase='idle'; state.duel.plays++;
    state.duel.best=Math.min(state.duel.best,t);
    word.style.color='var(--ok)';
    let label = t<250?'RELÂMPAGO':(t<400?'RÁPIDO':(t<600?'NORMAL':'LENTO'));
    word.textContent=`${t}ms — ${label}`;
    hint.textContent='clica em preparar pra duelar de novo'; btn.textContent='preparar';
    $('#dbest').textContent=state.duel.best+'ms'; $('#dplays').textContent=state.duel.plays;
    playSound('correct');
    if(t<300) unlock('fastdraw');
  }
}

  }, 250);
  state.witch.draws++;
  content.querySelector('.score-line').textContent=`cartas puxadas: ${state.witch.draws}`;

function renderBounty(){
  const unlocked=state.achievements;
  content.innerHTML = navHTML('bounty') + `
    <h2 class="q">Quadro de Recompensas</h2>
    <div class="bcount">${[...unlocked].filter(id=>id!==META_ID).length} / ${ACHV.length} encontradas</div>
    <div class="bgrid">${ACHV.map(a=>{
      const got=unlocked.has(a.id);
      return `<div class="bcard ${got?'':'locked'}">
        <span class="bicon">${got?a.icon:'❔'}</span>
        <span class="bname">${got?a.name:'??? não encontrada'}</span>
        ${got?a.desc:'Continue explorando a cidade pra descobrir.'}
      </div>`;
    }).join('')}</div>
    ${unlocked.has(META_ID)?'<div class="note">👑 Vc já libertou o forasteiro. O quadro se foi — mas os arquivos permanecem.</div>':''}
  `;
  bindNav();
}

/* ============================================================
   SECRETS (hints, not spoilers)
============================================================ */
function renderSecrets(){
  content.innerHTML = navHTML('secrets') + `
    <h2 class="q">Boatos da Cidade</h2>
    <p class="sub" style="margin-bottom:0">Ninguém confirma nada disso. Mas dizem por aí...</p>
    <ul class="secretlist">
      <li>Existe um código antigo, digitado com as setas do teclado, que termina em duas letras.</li>
      <li>Uma palavra mágica, digitada em qualquer lugar da tela, ecoa por Ridge B Valley.</li>
      <li>O xerife fantasma não gosta de ser cutucado demais. Ele reclama depois de um tempo.</li>
      <li>Um bicho pequeno se esconde de vez em quando nas perguntas do quiz.</li>
      <li>Ficar parado por tempo demais, sem tocar em nada, pode não ser tão seguro por aqui.</li>
      <li>O vento que rola pela tela esconde algo — se vc for rápido o bastante pra clicar nele.</li>
      <li>Quantos buracos de bala vc consegue deixar na tela antes que alguém perceba?</li>
      <li>A bruxa guarda uma carta que só aparece pra sortudos de verdade.</li>
      <li>Se vc encontrar tudo que existe por aqui... o quadro inteiro pode não aguentar.</li>
    </ul>
    <div class="note">🗝️ ${[...state.achievements].filter(id=>id!==META_ID).length}/${ACHV.length} boatos confirmados até agora.</div>
  `;
  bindNav();
}

/* ============================================================
   ESCAPE FINALE
============================================================ */
function triggerEscape(){
  toast('👑 Algo está acontecendo com o quadro...');
  speak('secret');
  const b=$('#board');
  setTimeout(()=>{
    b.classList.add('escaping');
    playSound('achv');
    setTimeout(()=>{ $('#finalOverlay').style.display='flex'; }, 2500);
  }, 1600);
}

/* ============================================================
   BOOT
============================================================ */
renderHome();
setInterval(()=>{ if(Math.random()<.25 && state.tab!=='home') speak('ambient'); }, 38000);
