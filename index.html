<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz: Bridger WESTERN 🤠</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Bitter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ecd9ae;
  --paper2:#e3c795;
  --paper-dark:#d8bb84;
  --wood:#4a2f1c;
  --wood-deep:#33200f;
  --leather:#7a4a26;
  --rust:#a3402a;
  --rust-deep:#822f1e;
  --ink:#2b1d12;
  --ink-soft:#5a4632;
  --brass:#b8863b;
  --ok:#4c6b2f;
  --bad:#8a2c1f;
  --display:'Rye', serif;
  --type:'Special Elite', cursive;
  --body:'Bitter', serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100vh;
  font-family:var(--body);
  color:var(--ink);
  background:
    radial-gradient(ellipse at 50% -10%, rgba(255,235,190,.5) 0%, transparent 55%),
    repeating-linear-gradient(0deg, rgba(90,60,20,.035) 0px, rgba(90,60,20,.035) 2px, transparent 2px, transparent 4px),
    linear-gradient(180deg, var(--wood) 0%, var(--wood-deep) 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 16px;
}

/* wanted-poster board */
#board{
  width:100%;
  max-width:600px;
  background:
    radial-gradient(circle at 15% 10%, rgba(120,80,30,.25), transparent 45%),
    radial-gradient(circle at 90% 85%, rgba(120,80,30,.2), transparent 45%),
    var(--paper);
  border:10px solid var(--wood);
  outline:2px solid var(--brass);
  outline-offset:-16px;
  border-radius:4px;
  padding:34px 32px 28px;
  position:relative;
  box-shadow:0 30px 55px -20px rgba(0,0,0,.6), inset 0 0 60px rgba(90,55,20,.25);
}
#board::before{
  content:"";
  position:absolute; inset:0;
  background-image:
    radial-gradient(circle, rgba(80,50,20,.10) 1px, transparent 1.4px);
  background-size:4px 4px;
  pointer-events:none;
  mix-blend-mode:multiply;
  opacity:.5;
}
.pin{
  position:absolute; width:14px; height:14px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #e8c66a, var(--brass) 70%);
  box-shadow:0 2px 3px rgba(0,0,0,.5);
}
.pin.tl{top:-7px;left:18px} .pin.tr{top:-7px;right:18px}

.eyebrow{
  font-family:var(--type);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--rust-deep);
  text-align:center;
  margin-bottom:2px;
}
h1{
  font-family:var(--display);
  font-size:34px;
  text-align:center;
  margin:2px 0 4px;
  color:var(--ink);
  letter-spacing:.02em;
  text-shadow:1px 1px 0 rgba(255,255,255,.25);
}
.sub{
  font-family:var(--type);
  font-size:13px;
  text-align:center;
  color:var(--ink-soft);
  line-height:1.6;
  margin-bottom:6px;
}
hr.rope{
  border:none;
  height:6px;
  margin:16px 0;
  background:
    repeating-linear-gradient(45deg, var(--leather) 0 3px, #8a5a30 3px 6px);
  border-radius:3px;
  opacity:.8;
}
.note{
  font-family:var(--type);
  font-size:11.5px;
  color:var(--ink-soft);
  background:rgba(255,255,255,.25);
  border:1px dashed var(--leather);
  border-radius:6px;
  padding:10px 12px;
  margin-top:14px;
  line-height:1.6;
}

/* progress: leather strap w/ brass fill */
#progwrap{margin:18px 0 6px}
#proglabel{
  display:flex; justify-content:space-between;
  font-family:var(--type); font-size:11px; color:var(--ink-soft); margin-bottom:5px;
}
#progbar{
  height:14px; background:#c9ac78; border:2px solid var(--wood);
  border-radius:3px; overflow:hidden; position:relative;
}
#progfill{
  height:100%; width:0%;
  background:repeating-linear-gradient(90deg, var(--rust) 0 8px, var(--rust-deep) 8px 16px);
  transition:width .4s ease;
}

h2.q{
  font-family:var(--display);
  font-size:21px;
  line-height:1.4;
  margin:18px 0 16px;
  color:var(--ink);
}
.opt{
  display:flex; align-items:center; gap:10px;
  padding:12px 14px; margin:9px 0;
  background:rgba(255,250,235,.55);
  border:2px solid var(--leather);
  border-radius:5px;
  cursor:pointer;
  font-family:var(--body);
  font-weight:600;
  font-size:14.5px;
  transition:.15s;
  color:var(--ink);
}
.opt:hover{background:rgba(255,250,235,.85); transform:translateX(2px)}
.opt.correct{border-color:var(--ok); background:#dfe9cf; color:var(--ok)}
.opt.wrong{border-color:var(--bad); background:#ecd6cf; color:var(--bad)}
.opt.disabled{pointer-events:none; opacity:.75}
.opt .letter{
  font-family:var(--display);
  font-size:16px;
  width:22px; text-align:center;
  color:var(--rust-deep);
}

#feedback{
  font-family:var(--type);
  font-size:13px;
  min-height:18px;
  margin-top:4px;
  color:var(--ink-soft);
}

.btnrow{margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
button{
  font-family:var(--display);
  font-size:16px;
  letter-spacing:.03em;
  padding:11px 26px;
  border-radius:5px;
  border:2px solid var(--wood);
  background:var(--paper-dark);
  color:var(--ink);
  cursor:pointer;
  transition:.15s;
}
button:hover{transform:translateY(-1px); box-shadow:0 6px 14px -6px rgba(0,0,0,.5)}
button.primary{
  background:linear-gradient(180deg, var(--rust), var(--rust-deep));
  color:#f8ece0;
  border-color:var(--wood-deep);
}
button:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none}

/* result */
#badge{
  width:96px;height:96px;margin:6px auto 10px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #f0d488, var(--brass) 75%);
  border:4px solid var(--wood);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
  box-shadow:0 8px 18px -8px rgba(0,0,0,.5);
}
.result-name{
  font-family:var(--display);
  font-size:27px;
  text-align:center;
  margin:6px 0 6px;
  color:var(--rust-deep);
}
.score-line{
  font-family:var(--type);
  text-align:center;
  font-size:13px;
  color:var(--ink-soft);
  margin-bottom:10px;
}
.result-text{font-size:14.5px; line-height:1.75; color:var(--ink)}
</style>
</head>
<body>

<div id="board">
  <div class="pin tl"></div><div class="pin tr"></div>
  <div id="content"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const content = $("#content");

/* ================= 25 questions, researched from the Bridger: WESTERN
   Roblox game and its official/community wikis & guides ================= */
const qs = [
["Em qual plataforma o Bridger: WESTERN foi lançado?",
 ["Steam","Roblox","itch.io","Epic Games"], 1],
["Quem é a desenvolvedora do jogo?",
 ["Rockstar Games","Mojang","BRIDGER INC.","Deltia's Gaming"], 2],
["Em qual região o jogo se passa?",
 ["Death Valley","Ridge B Valley","Sangre Valley","Copper Valley"], 1],
["Ao criar o personagem, entre quais duas facções o jogador escolhe?",
 ["Xerife ou Bandido","Outlaw ou Inlaw","Norte ou Sul","Vaqueiro ou Caçador"], 1],
["Atualmente, a escolha de facção...",
 ["muda completamente o estilo de jogo","não muda nada mecanicamente (ainda)","define seu Stand inicial","bloqueia certas armas"], 1],
["Qual é o nome da moeda do jogo?",
 ["Dollar","Moola","Gold Coin","Ridge Buck"], 1],
["Qual é considerada a forma mais segura e confiável de ganhar dinheiro no começo do jogo?",
 ["Duelos PvP","Pescaria","Assaltar trens","Vender cavalos"], 1],
["Onde fica o principal ponto de pesca pra iniciantes?",
 ["Rio Ridge","Lake Boullier","Swamp Lake","Red River"], 1],
["Pescando, existe uma chance bem pequena (0,5%) de tirar qual item raro?",
 ["Corpse Part","Arrow Shard","Stand Card","Dog Bane Herb"], 1],
["Qual é o sistema de talentos passivos do jogo, obtido através de uma bruxa?",
 ["Skills","Cards","Perks","Totems"], 1],
["Onde o jogador vai para conseguir Cards?",
 ["Outlaw Camp","A cabana da bruxa, no Swamp","Moe's Gun Store","A estação de trem"], 1],
["Qual opção o jogador escolhe pra ler a sorte com a bruxa?",
 ["\"draw a card\"","\"read my fortune\"","\"cast the bones\"","\"reveal my path\""], 1],
["Qual é o número máximo de slots de Card, alcançado no Tier 3?",
 ["1","2","3","5"], 2],
["Quanto custa cada Card extra depois do primeiro (que é grátis)?",
 ["20 Moola","50 Moola","100 Moola","450 Moola"], 1],
["De qual obra as habilidades de \"Stand\" do jogo são inspiradas?",
 ["Naruto","JoJo's Bizarre Adventure","Bleach","One Piece"], 1],
["Quais são as duas formas principais de conseguir um Stand?",
 ["Comprar na loja e completar quests","Corpse Parts e pescar Arrow Shards","Duelar com NPCs e votar em enquete","Subir de nível e trocar Moola"], 1],
["O que aparece anunciado no servidor quando um Corpse Part surge no mapa?",
 ["\"A stand awakens\"","\"It appears once again\"","\"The frontier calls\"","\"Beware the beam\""], 1],
["Qual Stand é apontado como um dos mais difíceis de obter, exigindo 100 kills totais e um killstreak de 10?",
 ["Star Platinum: The World","King Crimson","D4C","Tusk Act 1"], 2],
["Qual habilidade, ativada pela tecla X, está ligada à precisão de mira?",
 ["Fists","Ocular Prowess","Quick Dash","Block"], 1],
["Quais três Cards, combinados, aumentam bastante o Ocular PRO (assistência de mira)?",
 ["High Noon, Evil Eye e FAUX High Noon","Quick Draw, Steady Hand e Third Eye","Dead Aim, True Sight e Iron Will","Sharp Shot, Falcon Eye e Last Stand"], 0],
["O que acontece com seu personagem ao longo do tempo, por morte ou combat logging?",
 ["Ele fica mais forte","Ele envelhece","Ele perde o Stand automaticamente","Ele muda de facção"], 1],
["Qual erva ajuda a rejuvenescer o personagem?",
 ["Dogbane (Dog Bane Herb)","Ridge Root","Swamp Moss","Desert Sage"], 0],
["Se o jogador faz \"combat log\" (sai do jogo durante uma luta), o que acontece?",
 ["Nada, é seguro","Ele envelhece 10 anos instantaneamente","Perde todas as cartas","É banido permanentemente"], 1],
["Para que serve a tecla H no jogo?",
 ["Abrir o inventário","Invocar/desinvocar o cavalo","Recarregar a arma","Abrir o menu de estatísticas"], 1],
["Onde o jogador pode pagar pra \"rerolar\" e conseguir um cavalo melhor?",
 ["Moe's Gun Store","A estação de trem em Ridge B County","Lake Boullier","Outlaw Camp"], 1]
];

const state = { i:0, score:0, locked:false };

function renderIntro(){
  content.innerHTML = `
    <div class="eyebrow">☆ procurado por conhecimento ☆</div>
    <h1>Quiz do Frontier:<br>Bridger WESTERN</h1>
    <p class="sub">25 perguntas pra saber se vc é um verdadeiro forasteiro de Ridge B Valley ou só mais um caipira perdido.</p>
    <hr class="rope">
    <div class="note">🤠 cada pergunta tem só uma resposta certa. escolhe rápido, pistoleiro — o sol não espera por ninguém.</div>
    <div class="btnrow">
      <button class="primary" id="start">sacar o revólver e começar</button>
    </div>
  `;
  $("#start").onclick = ()=>{ state.i=0; state.score=0; draw(); };
}

function draw(){
  state.locked = false;
  const total = qs.length;
  const pct = Math.round(state.i/total*100);
  const [qtext, opts, correctIdx] = qs[state.i];

  content.innerHTML = `
    <div id="progwrap">
      <div id="proglabel"><span>pergunta ${state.i+1} de ${total}</span><span>acertos: ${state.score}</span></div>
      <div id="progbar"><div id="progfill" style="width:${pct}%"></div></div>
    </div>
    <h2 class="q">${qtext}</h2>
    <div id="opts"></div>
    <div id="feedback"></div>
    <div class="btnrow"><button class="primary" id="nextbtn" disabled>próxima</button></div>
  `;

  const optsEl = $("#opts");
  const letters = ["A","B","C","D"];
  opts.forEach((text,n)=>{
    const el = document.createElement("div");
    el.className = "opt";
    el.innerHTML = `<span class="letter">${letters[n]}</span><span>${text}</span>`;
    el.addEventListener("click", ()=> pick(n, correctIdx, el));
    optsEl.appendChild(el);
  });

  $("#nextbtn").onclick = ()=>{
    state.i++;
    if(state.i>=total){ showResult(); return; }
    draw();
  };
}

function pick(n, correctIdx, el){
  if(state.locked) return;
  state.locked = true;
  const opts = document.querySelectorAll(".opt");
  opts.forEach(o=> o.classList.add("disabled"));

  if(n===correctIdx){
    el.classList.add("correct");
    state.score++;
    $("#feedback").textContent = "acertou! bom faro, cowboy.";
  }else{
    el.classList.add("wrong");
    opts[correctIdx].classList.add("correct");
    $("#feedback").textContent = "errou essa — mas segue o rastro.";
  }
  $("#proglabel").innerHTML = `<span>pergunta ${state.i+1} de ${qs.length}</span><span>acertos: ${state.score}</span>`;
  $("#nextbtn").disabled = false;
}

function rankFor(score){
  if(score<=4) return {icon:"🥾", name:"Caipira Perdido", text:"Vc mal sabe distinguir um cavalo de uma mula, mas todo forasteiro começa em algum lugar. Volta pro saloon, estuda o trilho dos trens e tenta de novo."};
  if(score<=9) return {icon:"🐎", name:"Aprendiz de Cowboy", text:"Já sabe onde fica o Lake Boullier e não se perde tanto assim — mas Ridge B Valley ainda guarda segredos que vc não desconfia."};
  if(score<=14) return {icon:"🔫", name:"Pistoleiro Errante", text:"Vc conhece o jogo de verdade: sabe de Moola, Cards e onde a bruxa lê a sorte. Falta só afiar a mira nos detalhes mais obscuros."};
  if(score<=19) return {icon:"⭐", name:"Forasteiro Respeitado", text:"Poucos sabem tanto quanto vc sobre Stands, envelhecimento e a economia da fronteira. Seu nome já circula pelos becos de Ridge B County."};
  if(score<=23) return {icon:"💀", name:"Lenda de Ridge B Valley", text:"Vc domina quase tudo: Corpse Parts, Ocular Prowess, os segredos do Dog Bane. Poucos duelam com vc e vivem pra contar."};
  return {icon:"👑", name:"Lenda Absoluta da Fronteira", text:"Gabarito perfeito. Vc não jogou Bridger: WESTERN — vc viveu nele. Ridge B Valley deveria erguer uma estátua sua na praça."};
}

function showResult(){
  const r = rankFor(state.score);
  content.innerHTML = `
    <div class="eyebrow">☆ veredito do xerife ☆</div>
    <div id="badge">${r.icon}</div>
    <div class="result-name">${r.name}</div>
    <div class="score-line">${state.score} de ${qs.length} acertos</div>
    <hr class="rope">
    <p class="result-text">${r.text}</p>
    <div class="btnrow">
      <button class="primary" id="restart">encarar o quiz de novo</button>
    </div>
  `;
  $("#restart").onclick = ()=>{ renderIntro(); };
}

renderIntro();
</script>
</body>
</html>
